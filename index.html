<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>WaveWarZ - Live Ticker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Space+Grotesk:wght@400;600&display=swap" rel="stylesheet">
<style>
  /* Restream browser-source widget: the page fills WHATEVER box you draw in
     Studio (like the Polymarket ticker). No fixed positioning - 100% fill.
     Draw it as a wide slim strip across the top. All sizes scale with the
     box height via vh units. */
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:100%; height:100%; background:transparent; overflow:hidden; }

  :root { --gold:#FFC93C; --ink:#ffffff; --glass:rgba(10,12,16,0.82); }

  .ticker {
    width:100%; height:100%;
    display:flex; align-items:center; gap:2.2vh;
    padding:0 2.6vh;
    background:var(--glass);
    border-radius:1.6vh;
    white-space:nowrap; overflow:hidden;
  }

  .logo { display:flex; align-items:center; flex:0 0 auto; }
  .logo img { height:62vh; width:auto; display:block; }
  .logo .fallback { font-family:'Anton',sans-serif; font-size:34vh; color:var(--ink); display:none; letter-spacing:0.04em; }

  .live { display:flex; align-items:center; gap:1.2vh; flex:0 0 auto;
    font-family:'Space Grotesk',sans-serif; font-weight:600;
    font-size:16vh; letter-spacing:0.2em; color:var(--ink); }
  .live .dot { width:12vh; height:12vh; border-radius:50%; background:var(--gold);
    animation:pulse 1.6s ease-in-out infinite; }
  @keyframes pulse {
    0%,100% { opacity:1; box-shadow:0 0 0 0 rgba(255,201,60,0.55); }
    50%     { opacity:0.55; box-shadow:0 0 0 1.1vh rgba(255,201,60,0); }
  }

  .matchup { display:flex; align-items:baseline; gap:1.8vh; flex:0 0 auto;
    font-family:'Anton',sans-serif; color:var(--ink); }
  .matchup .name { font-size:38vh; letter-spacing:0.03em; line-height:1; }
  .matchup .vs   { font-size:24vh; color:var(--gold); letter-spacing:0.08em; }

  .sep { width:1px; height:52vh; background:rgba(255,255,255,0.14); flex:0 0 auto; }

  /* Rotating info slot - one stat/fun-fact at a time, crossfades every 8s */
  .slot { position:relative; flex:1 1 auto; min-width:0; height:100%; display:flex; align-items:center; overflow:hidden; }
  .slot .item {
    position:absolute; left:0; right:0;
    display:flex; align-items:baseline; gap:1.6vh;
    font-family:'Space Grotesk',sans-serif;
    opacity:0; transform:translateY(30%); transition:opacity 0.5s ease, transform 0.5s ease;
    overflow:hidden; text-overflow:ellipsis;
  }
  .slot .item.on { opacity:1; transform:none; }
  .slot .item b { font-family:'Anton',sans-serif; font-weight:400; font-size:30vh; color:var(--gold); font-variant-numeric:tabular-nums; }
  .slot .item span { font-size:15vh; letter-spacing:0.14em; color:rgba(255,255,255,0.66); text-transform:uppercase; }

  /* New-battle flash state */
  .ticker.alert { animation:alertflash 1s ease-in-out 3; }
  @keyframes alertflash {
    0%,100% { box-shadow:inset 0 0 0 0 rgba(255,201,60,0); }
    50%     { box-shadow:inset 0 0 0 0.6vh rgba(255,201,60,0.9); }
  }

  .eq { display:flex; align-items:flex-end; gap:0.6vh; height:34vh; flex:0 0 auto; }
  .eq span { width:0.9vh; background:var(--gold); border-radius:0.5vh;
    transform-origin:bottom; animation:eq 1.1s ease-in-out infinite; }
  .eq span:nth-child(1){ height:40%; animation-delay:0s; }
  .eq span:nth-child(2){ height:80%; animation-delay:0.15s; }
  .eq span:nth-child(3){ height:55%; animation-delay:0.3s; }
  .eq span:nth-child(4){ height:95%; animation-delay:0.08s; }
  .eq span:nth-child(5){ height:60%; animation-delay:0.22s; }
  @keyframes eq { 0%,100%{transform:scaleY(0.5);} 50%{transform:scaleY(1.05);} }

  @media (prefers-reduced-motion: reduce) {
    .live .dot, .eq span, .ticker.alert { animation:none; }
    .slot .item { transition:none; }
  }
</style>
</head>
<body>
  <div class="ticker" id="ticker">
    <div class="logo">
      <img src="https://wavewarz.com/images/battles/WaveWarZLogoFinal.PNG" alt="WaveWarZ"
           onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
      <span class="fallback">WAVEWARZ</span>
    </div>
    <div class="live"><span class="dot"></span>LIVE</div>
    <div class="sep"></div>
    <div class="matchup" id="matchup">
      <span class="name" id="left">ARTIST A</span>
      <span class="vs">VS</span>
      <span class="name" id="right">ARTIST B</span>
    </div>
    <div class="sep"></div>
    <div class="slot" id="slot"></div>
    <div class="eq" aria-hidden="true"><span></span><span></span><span></span><span></span><span></span></div>
  </div>

<script>
  (function () {
    var q = new URLSearchParams(location.search);
    function setText(id, key) {
      var v = q.get(key);
      if (v) document.getElementById(id).textContent = v.toUpperCase();
    }
    setText('left', 'left');
    setText('right', 'right');
    // ?nomatch=1 hides the matchup for between-battle scenes - pure stats ticker
    if (q.get('nomatch')) {
      document.getElementById('matchup').style.display = 'none';
    }

    // ---- live data -> rotating facts ----
    var facts = [ { v: 'BACK MUSIC', t: 'NOT MEMES' } ];
    var lastBattles = null;

    function shorten(addr) { return addr ? addr.slice(0, 4) + '..' + addr.slice(-4) : ''; }

    function rebuild(activity, volboard) {
      var f = [];
      if (Array.isArray(activity) && activity.length) {
        var battles = 0, buys = 0;
        var peak = activity[0];
        activity.forEach(function (d) {
          battles += (d.battles || 0); buys += (d.buys || 0);
          if ((d.battles || 0) > (peak.battles || 0)) peak = d;
        });
        var last = activity[activity.length - 1];
        var todayTx = (last.buys||0)+(last.sells||0)+(last.claims||0)+(last.mints||0);
        f.push({ v: String(battles), t: 'battles fought' });
        f.push({ v: todayTx + ' TX', t: 'today on-chain' });
        f.push({ v: String(buys), t: 'total buys' });
        if (peak && peak.battles) f.push({ v: peak.battles + ' battles', t: 'biggest day ' + (peak.date || '') });
        // new-battle flash: total battle count moved since last refresh
        if (lastBattles !== null && battles > lastBattles) {
          var tk = document.getElementById('ticker');
          tk.classList.remove('alert'); void tk.offsetWidth; tk.classList.add('alert');
          f.unshift({ v: 'NEW BATTLE', t: 'just settled on-chain' });
        }
        lastBattles = battles;
      }
      if (volboard && Array.isArray(volboard.rows) && volboard.rows.length) {
        var sol = volboard.rows.reduce(function (s, r) { return s + (r.sol || 0); }, 0);
        var top = volboard.rows[0];
        var w = (volboard.meta && volboard.meta.window_days) || 30;
        f.push({ v: sol.toFixed(1) + ' SOL', t: w + 'd trade volume' });
        if (top) f.push({ v: top.sol.toFixed(1) + ' SOL', t: 'top trader ' + shorten(top.trader) });
        f.push({ v: volboard.rows.length + '', t: 'traders this month' });
      }
      f.push({ v: 'BACK MUSIC', t: 'NOT MEMES' });
      facts = f;
    }

    function refresh() {
      Promise.all([
        fetch('/ww-activity.json', { cache: 'no-store' }).then(function (r) { return r.json(); }).catch(function () { return null; }),
        fetch('/ww-volboard.json', { cache: 'no-store' }).then(function (r) { return r.json(); }).catch(function () { return null; })
      ]).then(function (res) { rebuild(res[0], res[1]); });
    }

    // ---- rotation ----
    var slot = document.getElementById('slot');
    var idx = 0, current = null;
    function rotate() {
      var f = facts[idx % facts.length]; idx++;
      var el = document.createElement('div');
      el.className = 'item';
      el.innerHTML = '<b></b><span></span>';
      el.querySelector('b').textContent = f.v;
      el.querySelector('span').textContent = f.t;
      slot.appendChild(el);
      requestAnimationFrame(function () { requestAnimationFrame(function () { el.classList.add('on'); }); });
      if (current) {
        var old = current;
        old.classList.remove('on');
        setTimeout(function () { old.remove(); }, 600);
      }
      current = el;
    }

    refresh();
    rotate();
    setInterval(rotate, 8000);
    setInterval(refresh, 90000);
  })();
</script>
</body>
</html>
