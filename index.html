<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>WaveWarZ - Now Battling</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Space+Grotesk:wght@400;600&display=swap" rel="stylesheet">
<style>
  /* Transparent page: composites over video in Restream browser source */
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { background:transparent; overflow:hidden; height:100%; }

  :root { --gold:#FFC93C; --ink:#ffffff; --glass:rgba(10,12,16,0.78); }

  .bar {
    position:fixed; left:50%; bottom:6vh; transform:translateX(-50%);
    display:flex; align-items:center; gap:22px;
    padding:14px 28px 14px 18px;
    background:var(--glass);
    border:1px solid rgba(255,255,255,0.10);
    border-radius:14px;
    backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px);
    box-shadow:0 8px 32px rgba(0,0,0,0.45);
    white-space:nowrap;
  }

  .logo { display:flex; align-items:center; }
  .logo img { height:52px; width:auto; display:block; }
  .logo .fallback {
    font-family:'Anton', sans-serif; font-size:30px; letter-spacing:0.04em;
    color:var(--ink); display:none;
  }

  .live {
    display:flex; align-items:center; gap:8px;
    font-family:'Space Grotesk', sans-serif; font-weight:600;
    font-size:13px; letter-spacing:0.22em; color:var(--ink);
  }
  .live .dot {
    width:10px; height:10px; border-radius:50%; background:var(--gold);
    animation:pulse 1.6s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity:1; box-shadow:0 0 0 0 rgba(255,201,60,0.55); }
    50%       { opacity:0.55; box-shadow:0 0 0 7px rgba(255,201,60,0); }
  }

  .matchup {
    display:flex; align-items:baseline; gap:16px;
    font-family:'Anton', sans-serif; color:var(--ink);
  }
  .matchup .name { font-size:34px; letter-spacing:0.03em; line-height:1; }
  .matchup .vs   { font-size:20px; color:var(--gold); letter-spacing:0.08em; }

  .meta {
    display:flex; flex-direction:column; gap:6px; align-items:flex-start;
  }
  .sub {
    font-family:'Space Grotesk', sans-serif; font-size:12px; font-weight:400;
    letter-spacing:0.14em; color:rgba(255,255,255,0.65); text-transform:uppercase;
  }

  .eq { display:flex; align-items:flex-end; gap:3px; height:26px; }
  .eq span {
    width:4px; background:var(--gold); border-radius:2px;
    animation:eq 1.1s ease-in-out infinite;
  }
  .eq span:nth-child(1){ height:40%; animation-delay:0s;    }
  .eq span:nth-child(2){ height:80%; animation-delay:0.15s; }
  .eq span:nth-child(3){ height:55%; animation-delay:0.3s;  }
  .eq span:nth-child(4){ height:95%; animation-delay:0.08s; }
  .eq span:nth-child(5){ height:60%; animation-delay:0.22s; }
  @keyframes eq {
    0%,100% { transform:scaleY(0.5); }
    50%     { transform:scaleY(1.05); }
  }
  .eq span { transform-origin:bottom; }

  @media (prefers-reduced-motion: reduce) {
    .live .dot { animation:none; }
    .eq span   { animation:none; transform:none; }
  }
</style>
</head>
<body>
  <div class="bar">
    <div class="logo">
      <img src="https://wavewarz.com/images/battles/WaveWarZLogoFinal.PNG" alt="WaveWarZ"
           onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
      <span class="fallback">WAVEWARZ</span>
    </div>
    <div class="meta">
      <div class="live"><span class="dot"></span>LIVE</div>
      <div class="sub" id="sub">Back Music, Not Memes.</div>
    </div>
    <div class="matchup">
      <span class="name" id="left">ARTIST A</span>
      <span class="vs">VS</span>
      <span class="name" id="right">ARTIST B</span>
    </div>
    <div class="eq" aria-hidden="true"><span></span><span></span><span></span><span></span><span></span></div>
  </div>

<script>
  // One URL to paste into Restream: ?left=Name&right=Name&sub=Custom+line
  (function () {
    var q = new URLSearchParams(location.search);
    function set(id, key, upper) {
      var v = q.get(key);
      if (v) document.getElementById(id).textContent = upper ? v.toUpperCase() : v;
    }
    set('left',  'left',  true);
    set('right', 'right', true);
    set('sub',   'sub',   false);
  })();
</script>
</body>
</html>
